name: Daily job scrape

on:
  schedule:
    # Single run targeting 03:00 UK time. GitHub uses UTC, so:
    #   - 02:00 UTC = 03:00 BST in summer (correct)
    #   - 02:00 UTC = 02:00 GMT in winter (one hour earlier)
    # GitHub Actions free tier delays scheduled runs by 1-4 hours during
    # high-load periods, so the actual run will arrive between ~3am and
    # ~7am UK time - still well before Nia wakes.
    - cron: '0 2 * * *'
  workflow_dispatch:  # allows manual triggering from the GitHub UI

permissions:
  contents: write   # needed to commit seen_jobs.json and docs/index.html back to repo
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          PAGES_URL: ${{ secrets.PAGES_URL }}
        run: python scraper.py

      - name: Commit results
        run: |
          git config user.name "job-scraper-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen_jobs.json docs/index.html || true
          git diff --staged --quiet || git commit -m "Daily scrape $(date -u +%Y-%m-%d)"
          git push
